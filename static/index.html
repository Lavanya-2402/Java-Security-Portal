<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureCode AI</title>
    <!-- Google Fonts integration for a premium aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Glowing Compact Header Banner -->
        <header class="header-banner">
            <div class="header-content">
                <h1>SecureCode AI</h1>
                <p>Fine-Tuned 32B Model & RAG-Augmented Remediation Pipeline</p>
            </div>
            <div class="team-badge">Team 3276</div>
        </header>

        <!-- Main Layout Split Grid -->
        <main class="grid-layout">
            <!-- Left Pane: Input Code -->
            <section class="card panel-input">
                <div class="panel-header">
                    <h2>📥 Input Java Code</h2>
                    <span class="editor-desc">Paste your vulnerable or secure Java code</span>
                </div>
                <div class="panel-body">
                    <div class="editor-container">
                        <div class="editor-tab-bar">
                            <span class="editor-tab active">Input.java</span>
                        </div>
                        <textarea id="input-code" placeholder="Paste your Java code snippet here..." spellcheck="false"></textarea>
                    </div>
                    <button id="scan-btn" class="btn btn-primary">🔍 Scan & Remediate Code</button>
                </div>
            </section>

            <!-- Right Pane: Remediated Output -->
            <section class="card panel-output">
                <div class="panel-header">
                    <h2>📤 Remediated Java Code</h2>
                    <span class="editor-desc">Remediated & validated source code</span>
                </div>
                <div class="panel-body">
                    <div class="editor-container">
                        <div class="editor-tab-bar">
                            <span class="editor-tab active">Remediated.java</span>
                        </div>
                        <textarea id="remediated-code" readonly placeholder="Secure code output will appear here..." spellcheck="false"></textarea>
                    </div>
                    <div class="output-actions">
                        <button id="download-btn" class="btn btn-secondary" style="margin-right: 10px;">📥 Download File</button>
                        <button id="copy-btn" class="btn btn-secondary">📋 Copy Code</button>
                    </div>
                </div>
            </section>
        </main>

        <!-- Loading Spinner Container -->
        <div id="loading-overlay" class="hidden">
            <div class="spinner-box">
                <div class="spinner"></div>
                <p id="loading-text">Analyzing code with GPU model...</p>
            </div>
        </div>

        <!-- Scan Results & Badges -->
        <section id="results-section" class="card hidden">
            <div class="results-header">
                <h3>🔍 Scan Analysis Results</h3>
                <div id="status-badges">
                    <!-- Badges injected dynamically here -->
                </div>
            </div>

            <!-- CWE Guidelines & Detailed Analysis Injected Here -->
            <div id="cwe-card" class="cwe-card">
                <!-- Injected dynamically via app.js -->
            </div>
        </section>

    </div>

    <!-- Include Javascript logic -->
    <script src="app.js"></script>
</body>
</html>
